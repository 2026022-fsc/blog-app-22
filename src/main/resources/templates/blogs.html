<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www/thymeleaf.org">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="/css/style.css">
   <title>spring</title>
</head>

<body>
   <header>
      <a href="/blogs" class="homeBack">
         <h1>spring</h1>
      </a>
      <input type="text" placeholder="キーワード検索" name="searchForm" class="searchForm">
      <a href="/blogs/newPost" class="postButton">投稿</a>
   </header>

   <nav>
      <ul>
         <li>ホーム</li>
         <li>プロフィール</li>
      </ul>
   </nav>

   <div class="card-grid">
      <!-- <div class="card">
         <a href="/blogs/detail">
            <h3>ブログ1</h3> 
            <p>ブログ本文</p>
         </a>

      </div>

      <div class="card">
         <a href="/blogs/detail">
            <h3>ブログ2</h3> 
            <p>ブログ本文</p>
         </a>

      </div> -->

      <div class="card" th:each="blog:${blogs}">
         <a th:href="@{/blogs/{id}(id=${blog.id})}" class="blogDetail">
            <h3 th:text="${blog.title}">ブログ</h3> 
            <p th:text="${blog.texts}">ブログ本文</p>
         </a>
      </div>
   </div>

</body>

</html>

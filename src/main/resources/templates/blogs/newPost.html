<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www/thymeleaf.org">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="/css/style.css">
   <title>新規投稿</title>
</head>

<body>
   <header>
      <a href="/blogs" class="homeBack">
         <h1>spring</h1>
      </a>
      <input type="text" placeholder="キーワード検索" name="searchForm" class="searchForm">
      <a href="/blogs/newPost" class="postButton">投稿</a>
   </header>

   <div class="yoko">
      <nav>
         <ul>
            <a href="/blogs" class="navigation">
               <li>ホーム</li>
            </a>
            <li>プロフィール</li>

         </ul>
      </nav>

      <form action="/blogs" method="post">
         <label for="postTitle">タイトル</label><br>
         <input type="text" name="title"><br>

         <label for="postTexts">本文</label><br>
         <input type="text" name="texts"><br>

         <input type="submit" value="保存">
      </form>
   </div>



</body>

</html>
